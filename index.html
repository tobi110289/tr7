<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>TR-7</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230a0705'/><rect x='6' y='6' width='4' height='4' fill='%23ffb454'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --phos:#ffb454;
    --phos-dim:#96682e;
    --phos-faint:#5c3f1c;
    --bg:#0a0705;
    --danger:#ff6a4d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:#000;
    font-family:'VT323','Courier New',monospace;
    color:var(--phos);
    overflow:hidden;
    -webkit-font-smoothing:none;
  }
  /* ------- the tube ------- */
  #tube{
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 120% 90% at 50% 40%, rgba(255,180,84,.045), transparent 60%),
      var(--bg);
    display:flex;flex-direction:column;
    padding:max(18px,env(safe-area-inset-top)) 20px max(18px,env(safe-area-inset-bottom));
    animation:powerOn .9s cubic-bezier(.23,1,.32,1) both;
  }
  @keyframes powerOn{
    0%{transform:scaleY(.004) scaleX(.6);filter:brightness(8)}
    45%{transform:scaleY(.02) scaleX(1);filter:brightness(6)}
    100%{transform:scale(1);filter:brightness(1)}
  }
  /* scanlines + slow roll */
  #tube::before{
    content:"";position:fixed;inset:-10%;pointer-events:none;z-index:40;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.28) 2px 4px);
  }
  #tube::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:41;
    background:
      radial-gradient(ellipse 140% 120% at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%),
      linear-gradient(to bottom, transparent 0%, rgba(255,180,84,.02) 50%, transparent 100%);
  }
  .rollbar{
    position:fixed;left:0;right:0;height:18vh;z-index:39;pointer-events:none;
    background:linear-gradient(to bottom, transparent, rgba(255,220,170,.03), transparent);
    animation:roll 7s linear infinite;
  }
  @keyframes roll{from{top:-20%}to{top:110%}}
  #flick{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:42;animation:flick 4s steps(1) infinite}
  @keyframes flick{
    0%,93%,100%{opacity:0}
    94%{opacity:.015}
    95%{opacity:0}
    96.5%{opacity:.02}
    97%{opacity:0}
  }
  @media (prefers-reduced-motion: reduce){
    .rollbar,#flick{display:none}
    #tube{animation:none}
  }
  /* ------- VHS OSD ------- */
  .osd{
    display:flex;justify-content:space-between;align-items:baseline;
    font-size:clamp(18px,4.5vw,24px);
    color:var(--phos-dim);
    text-shadow:0 0 6px rgba(255,180,84,.35);
    user-select:none;
  }
  #osdMode .rec{color:var(--danger);animation:blink 1.2s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  /* ------- terminal ------- */
  #term{
    flex:1;display:flex;flex-direction:column;justify-content:center;
    max-width:36ch;width:100%;margin:0 auto;
    font-size:clamp(21px,5.6vw,30px);
    line-height:1.45;
    text-shadow:
      0 0 7px rgba(255,180,84,.55),
      0 0 22px rgba(255,140,40,.18),
      1px 0 0 rgba(255,60,60,.28),
      -1px 0 0 rgba(80,200,255,.22);
  }
  #log{white-space:pre-wrap;word-break:break-word}
  #log .dim{color:var(--phos-dim)}
  #log .bad{color:var(--danger)}
  .cursor{display:inline-block;width:.6em;height:1em;background:var(--phos);vertical-align:-.12em;animation:blink 1s steps(1) infinite}
  /* prompt */
  #promptRow{display:none;align-items:baseline;gap:.4ch;margin-top:.6em}
  #promptRow.on{display:flex}
  #promptRow .chev{color:var(--phos-dim)}
  #word{
    flex:1;background:transparent;border:0;outline:0;
    font:inherit;color:inherit;text-shadow:inherit;
    letter-spacing:.08em;text-transform:uppercase;
    caret-color:var(--phos);
    min-width:2ch;
  }
  /* wrong-word jolt */
  .jolt{animation:jolt .28s linear}
  @keyframes jolt{
    0%,100%{transform:none;filter:none}
    20%{transform:translateX(-6px) skewX(-2deg);filter:hue-rotate(-30deg)}
    45%{transform:translateX(5px) skewX(1.5deg)}
    70%{transform:translateX(-3px)}
  }
  /* unlock glitch burst */
  .burst{animation:burst .55s steps(2) both}
  @keyframes burst{
    0%{clip-path:inset(0 0 0 0);transform:none}
    20%{clip-path:inset(12% 0 60% 0);transform:translateX(-9px)}
    40%{clip-path:inset(55% 0 8% 0);transform:translateX(8px) skewX(3deg)}
    60%{clip-path:inset(30% 0 30% 0);transform:translateX(-5px)}
    80%{clip-path:inset(5% 0 75% 0);transform:translateX(4px)}
    100%{clip-path:inset(0 0 0 0);transform:none}
  }
  /* ------- theatre ------- */
  #theatre{display:none;flex:1;flex-direction:column;justify-content:center;align-items:center;gap:22px}
  #theatre.on{display:flex}
  #frame{
    width:min(92vw, 78vh * 1.3333);
    aspect-ratio:4/3;
    background:#000;
    border:1px solid var(--phos-faint);
    border-radius:10px;
    box-shadow:0 0 40px rgba(255,150,50,.09), inset 0 0 60px rgba(0,0,0,.8);
    position:relative;overflow:hidden;
  }
  #frame video{width:100%;height:100%;object-fit:contain;display:block}
  #playBtn{
    position:absolute;inset:0;width:100%;height:100%;
    background:rgba(5,3,2,.55);border:0;cursor:pointer;
    font:inherit;color:var(--phos);
    font-size:clamp(26px,7vw,40px);letter-spacing:.15em;
    text-shadow:0 0 12px rgba(255,180,84,.6);
    display:flex;align-items:center;justify-content:center;
  }
  #playBtn:active{transform:scale(.98)}
  /* ------- the file ------- */
  #fileBtn{
    display:none;background:none;border:0;cursor:pointer;
    font:inherit;color:var(--phos-dim);
    font-size:clamp(18px,4.5vw,24px);
    text-shadow:0 0 6px rgba(255,180,84,.35);
    padding:0;
  }
  #fileBtn.on{display:inline}
  #fileView{display:none;flex:1;flex-direction:column;overflow-y:auto;gap:26px;padding:14px 2px}
  #fileView.on{display:flex}
  .entry{max-width:36ch;width:100%;margin:0 auto}
  .entry .elabel{color:var(--phos-dim);font-size:clamp(17px,4.2vw,22px);margin-bottom:6px}
  .entry img{width:100%;border:1px solid var(--phos-faint);border-radius:6px;display:block;margin-bottom:8px;filter:sepia(.25) saturate(.8) contrast(1.02)}
  .entry .etext{font-size:clamp(19px,4.8vw,25px);line-height:1.4}
  #fileBack{color:var(--phos-dim);background:none;border:0;cursor:pointer;font:inherit;font-size:clamp(18px,4.5vw,24px);text-align:left;padding:0;max-width:36ch;margin:0 auto;width:100%}
  /* ------- closing card ------- */
  #card{display:none;flex:1;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:1.1em;padding:0 8px}
  #card.on{display:flex}
  #card .big{
    font-size:clamp(26px,7vw,44px);letter-spacing:.06em;line-height:1.35;
    text-shadow:0 0 10px rgba(255,180,84,.6),0 0 30px rgba(255,140,40,.25),1px 0 0 rgba(255,60,60,.3),-1px 0 0 rgba(80,200,255,.25);
    animation:fadeUp 1.4s ease-out .3s both;
  }
  #card .small{
    color:var(--phos-dim);font-size:clamp(18px,4.6vw,26px);
    animation:fadeUp 1.4s ease-out 1.6s both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="tube">
  <div class="osd">
    <span id="osdMode"><span class="rec">■</span> STOP</span>
    <span id="osdCount">07:14:00</span>
  </div>

  <div id="term">
    <div id="log"></div>
    <div id="promptRow">
      <span class="chev">&gt;</span>
      <input id="word" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" enterkeyhint="go" aria-label="the word">
    </div>
  </div>

  <div id="theatre">
    <div id="frame">
      <video id="vid" src="opening.mp4" playsinline preload="none"></video>
      <button id="playBtn">▶ PLAY</button>
    </div>
  </div>

  <div id="card">
    <div class="big">ONE OF US WILL<br>FIND YOU SOON.</div>
    <div class="small">(the door knows you now.)</div>
  </div>

  <div id="fileView">
    <button id="fileBack">&lt; BACK</button>
    <div id="entries"></div>
  </div>

  <div class="osd" style="justify-content:space-between"><button id="fileBtn">:: THE FILE</button><span id="osdTape">TR-7</span></div>
</div>
<div class="rollbar"></div>
<div id="flick"></div>

<script>
(function(){
  'use strict';
  var KEYHASH='c95becc93e202889e6e8ac8735ba2ef0fa11a8fdd70f537cbb56b2dff18c1a16';
  var LS='tr7.open';
  function sha256hex(str){
    return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)).then(function(buf){
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
    });
  }
  function deriveKey(word){
    var enc=new TextEncoder();
    return crypto.subtle.importKey('raw',enc.encode(word),'PBKDF2',false,['deriveKey']).then(function(km){
      return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('tr7-file-v1'),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},true,['decrypt']);
    });
  }
  function keyToHex(key){return crypto.subtle.exportKey('raw',key).then(function(b){return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')})}
  function hexToKey(hex){
    var bytes=new Uint8Array(hex.match(/.{2}/g).map(function(h){return parseInt(h,16)}));
    return crypto.subtle.importKey('raw',bytes,{name:'AES-GCM'},false,['decrypt']);
  }
  function gcmDecrypt(key,buf){
    var u=new Uint8Array(buf);
    return crypto.subtle.decrypt({name:'AES-GCM',iv:u.slice(0,12)},key,u.slice(12));
  }
  var log=document.getElementById('log');
  var promptRow=document.getElementById('promptRow');
  var input=document.getElementById('word');
  var term=document.getElementById('term');
  var theatre=document.getElementById('theatre');
  var card=document.getElementById('card');
  var vid=document.getElementById('vid');
  var playBtn=document.getElementById('playBtn');
  var osdMode=document.getElementById('osdMode');
  var tube=document.getElementById('tube');
  var unlocked=false;
  try{unlocked=localStorage.getItem(LS)==='1'}catch(e){}

  /* ---- tape counter: 07:14:xx, seconds tick ---- */
  var s=0;
  setInterval(function(){
    s=(s+1)%60;
    document.getElementById('osdCount').textContent='07:14:'+String(s).padStart(2,'0');
  },1000);

  /* ---- faint tape hiss on first interaction ---- */
  var hissStarted=false;
  function hiss(){
    if(hissStarted)return;hissStarted=true;
    try{
      var ac=new (window.AudioContext||window.webkitAudioContext)();
      var len=ac.sampleRate*2, buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0), last=0;
      for(var i=0;i<len;i++){var w=Math.random()*2-1; last=(last+.02*w)/1.02; d[i]=last*3.5;}
      var src=ac.createBufferSource();src.buffer=buf;src.loop=true;
      var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=3200;
      var g=ac.createGain();g.gain.value=.012;
      src.connect(lp);lp.connect(g);g.connect(ac.destination);src.start();
      window.__hissGain=g;
    }catch(e){}
  }
  window.addEventListener('touchstart',hiss,{once:true});
  window.addEventListener('keydown',hiss,{once:true});

  /* ---- typewriter ---- */
  function type(lines,done){
    var li=0;
    var cur=document.createElement('span');cur.className='cursor';
    log.appendChild(cur);
    function nextLine(){
      if(li>=lines.length){cur.remove();done&&done();return}
      var item=lines[li++];
      var span=document.createElement('span');
      if(item.cls)span.className=item.cls;
      log.insertBefore(span,cur);
      var txt=item.t, ci=0;
      (function tick(){
        if(ci<txt.length){
          span.textContent+=txt[ci++];
          setTimeout(tick, txt[ci-1]==='.'?28:(14+Math.random()*22));
        }else{
          log.insertBefore(document.createTextNode('\n'),cur);
          setTimeout(nextLine,item.pause||160);
        }
      })();
    }
    nextLine();
  }
  function print(t,cls){
    var span=document.createElement('span');
    if(cls)span.className=cls;
    span.textContent=t+'\n';
    log.appendChild(span);
  }

  /* ---- boot ---- */
  var bootFresh=[
    {t:':: REWIND ........ OK',cls:'dim'},
    {t:':: TRACKING ...... OK',cls:'dim'},
    {t:':: SIGNAL ........ FOUND',cls:'dim',pause:420},
    {t:':: GUEST ......... ANNA',pause:700},
    {t:' '},
    {t:'SAY THE WORD.',pause:150}
  ];
  var bootBack=[
    {t:':: REWIND ........ OK',cls:'dim'},
    {t:':: GUEST ......... ANNA',cls:'dim'},
    {t:':: DOOR .......... OPEN',pause:600},
    {t:' '},
    {t:'WELCOME BACK.',pause:150}
  ];

  function gate(){
    promptRow.classList.add('on');
    input.focus();
  }
  document.addEventListener('click',function(){
    if(promptRow.classList.contains('on'))input.focus();
  });

  var tries=0;
  var noes=['NO.','NOT THAT.','CUTE. BUT NO.'];
  input.addEventListener('keydown',function(e){
    if(e.key!=='Enter')return;
    var v=(input.value||'').toLowerCase().replace(/[\s.]/g,'');
    if(!v)return;
    print('> '+input.value.toUpperCase());
    input.value='';
    sha256hex(v).then(function(h){
      if(h===KEYHASH){open(v);return}
      tries++;
      var msg=tries<=noes.length?noes[tries-1]:'THERE IS A WORLD WHERE NO ONE KEEPS\nA BIRTHDAY TO THEMSELVES.';
      print(msg, tries>noes.length?'dim':'bad');
      term.classList.remove('jolt');void term.offsetWidth;term.classList.add('jolt');
    });
  });

  function open(word){
    try{localStorage.setItem(LS,'1')}catch(e){}
    unlocked=true;
    deriveKey(word).then(keyToHex).then(function(hex){
      try{localStorage.setItem('tr7.k',hex)}catch(e){}
      if(target==='file'){print(':: PROTOCOL ACCEPTED','dim');setTimeout(openFile,600);}
    }).catch(function(){});
    promptRow.classList.remove('on');
    input.blur();
    print(' ');
    maybeShowFileBtn();
    if(target==='file')return;
    print(':: DOOR OPEN','dim');
    tube.classList.add('burst');
    setTimeout(showTheatre,750);
  }

  function showTheatre(){
    term.style.display='none';
    theatre.classList.add('on');
    vid.preload='auto';vid.load();
    osdMode.innerHTML='<span class="rec">●</span> READY';
  }

  playBtn.addEventListener('click',function(){
    playBtn.style.display='none';
    if(window.__hissGain)window.__hissGain.gain.value=.004;
    vid.play().catch(function(){ended()});
    osdMode.textContent='▶ PLAY';
  });
  vid.addEventListener('ended',ended);
  vid.addEventListener('error',function(){
    playBtn.style.display='none';
    ended(true);
  });
  function ended(lost){
    osdMode.innerHTML='<span class="rec">■</span> STOP';
    theatre.classList.remove('on');
    if(lost){
      card.querySelector('.big').textContent='SIGNAL LOST.';
      card.querySelector('.small').textContent='(return later. the door will remember.)';
    }
    card.classList.add('on');
    if(window.__hissGain)window.__hissGain.gain.value=.012;
  }

  /* ---- the file ---- */
  var fileBtn=document.getElementById('fileBtn');
  var fileView=document.getElementById('fileView');
  var entriesEl=document.getElementById('entries');
  var target='tape';
  var entriesAvailable=false;
  fetch('entries.json.enc',{method:'HEAD'}).then(function(r){
    if(r.ok){entriesAvailable=true;maybeShowFileBtn();}
  }).catch(function(){});
  function maybeShowFileBtn(){
    if(entriesAvailable&&unlocked)fileBtn.classList.add('on');
  }
  fileBtn.addEventListener('click',function(){
    var k=null;try{k=localStorage.getItem('tr7.k')}catch(e){}
    if(k){openFile();return}
    target='file';
    card.classList.remove('on');theatre.classList.remove('on');
    term.style.display='';
    print(' ');
    print('THE LEDGER ASKS AGAIN. (PROTOCOL.)','dim');
    promptRow.classList.add('on');input.focus();
  });
  document.getElementById('fileBack').addEventListener('click',function(){location.reload()});
  function openFile(){
    term.style.display='none';card.classList.remove('on');theatre.classList.remove('on');
    fileView.classList.add('on');
    osdMode.textContent='▤ FILE';
    var khex=null;try{khex=localStorage.getItem('tr7.k')}catch(e){}
    if(!khex)return;
    hexToKey(khex).then(function(key){
      return fetch('entries.json.enc').then(function(r){return r.arrayBuffer()})
        .then(function(buf){return gcmDecrypt(key,buf)})
        .then(function(pt){return JSON.parse(new TextDecoder().decode(pt))})
        .then(function(list){
          entriesEl.innerHTML='';
          list.forEach(function(en){
            var d=document.createElement('div');d.className='entry';
            var l=document.createElement('div');l.className='elabel';l.textContent=en.label||'';d.appendChild(l);
            if(en.img){
              var im=document.createElement('img');
              fetch(en.img).then(function(r){return r.arrayBuffer()}).then(function(b){return gcmDecrypt(key,b)}).then(function(pb){
                im.src=URL.createObjectURL(new Blob([pb],{type:'image/jpeg'}));
              }).catch(function(){im.remove()});
              d.appendChild(im);
            }
            var t=document.createElement('div');t.className='etext';t.textContent=en.text||'';d.appendChild(t);
            entriesEl.appendChild(d);
          });
        });
    }).catch(function(){
      entriesEl.textContent='THE FILE WILL NOT OPEN TODAY.';
    });
  }

  /* ---- start ---- */
  setTimeout(function(){
    if(unlocked){
      type(bootBack,function(){
        setTimeout(showTheatre,500);
      });
    }else{
      type(bootFresh,gate);
    }
  },1000);
})();
</script>
</body>
</html>
